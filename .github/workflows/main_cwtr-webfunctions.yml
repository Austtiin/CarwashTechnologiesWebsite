name: Build and deploy dotnet core project to Azure Function App - cwtr-webfunctions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 🔍 (Optional but helpful first run)
      - name: Debug - list files
        run: ls -R

      # ✅ Auto-find and publish project
      - name: Publish Azure Function
        run: |
          PROJECT=$(find . -name "*.csproj" | head -n 1)
          echo "Using project: $PROJECT"
          dotnet publish "$PROJECT" \
            --configuration Release \
            --output ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0ED06285A01B4AD59A18A354B7FCF70B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FE4F3284FB074C0E80A185DBE9955DE3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C46C4064F5934A81A3920BD0FE743FF7 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'cwtr-webfunctions'
          slot-name: 'Production'
          package: './publish'